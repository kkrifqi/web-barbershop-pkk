<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking App - Crown Barbershop</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="booking-card">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">C</div>
            </div>
            <div class="powered-by">
                POWERED BY <br>
                <span>CROWN BARBERSHOP</span>
            </div>
        </div>

        <div class="content">
            <p class="instruction">Choose an option:</p>

            <a href="service.html" style="text-decoration: none; color: inherit;">
                <div class="option-row">
                    <div class="icon-circle">
                        <i class="fa-regular fa-user"></i>
                    </div>
                    <div class="option-text">Book for one person</div>
                    <div class="arrow">
                        <i class="fa-solid fa-chevron-right"></i>
                    </div>
                </div>
            </a>

        </div>
    </div>
    
    <script>
    // Inisialisasi awal harus kosong agar tidak ada sangkut paut dengan booking lama
    let selectedServices = []; 

    // Fungsi untuk menampilkan layanan (Your Services)
    function updateServiceDisplay() {
        const container = document.getElementById('selectedServicesList');
        // Jika array kosong, tampilkan pesan atau sembunyikan section
        if (selectedServices.length === 0) {
            container.innerHTML = "<p>No services selected.</p>";
            return;
        }
        // ... kode kamu untuk render list layanan ...
    }

    // PENTING: Saat halaman dimuat, cek apakah kita baru saja reset
    window.onload = function() {
        // Jika kamu ingin benar-benar fresh setiap balik ke sini
        updateServiceDisplay();
    };
    </script>

</body>
</html>
