<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Login</title>
        <style>
            *{
                box-sizing: border-box;
                margin: 0;
                padding: 0;
                font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            }

            body{
                background-image: url(CrownLands.png);
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                min-height: 100vh;
                display: flex;
                justify-content: center;
                align-items: center;
                position: relative;
            }

            body::after{
                content: '';
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                background-color: rgba(0, 0, 0, 0.6);
                z-index: 1;
                pointer-events: none;
            }

            .login-container{
                background-color: rgba(255, 255, 255, 0.15);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.2);
                padding: 50px;
                border-radius: 15px;
                box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
                width: 500%;
                max-width: 90%;
                z-index: 10;
                position: relative;
                color: white;
                text-align: center;
            }

            .login-container h2{
                margin-bottom: 30px;
                font-size: 28px;
                letter-spacing: 1px;
            }

            .input-group{
                margin-bottom: 20px;
                text-align: left;
            }

            .input-group label{
                display: block;
                margin-bottom: 8px;
                font-size: 14px;
                color: #ffffff;
            }

            .input-group input{
                width: 100%;
                padding: 15px 20px;
                font-size: 16px;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.1);
                border: 1px solid rgba(255, 255, 255, 0.3);
                color: white;
                outline: none;
                transition: 0.3s;
            }

            .input-group input:focus{
                border-color: #007bff;
                background: rgba(255, 255, 255, 0.2);
                box-shadow: 0 0 8px rgba(0, 123, 255, 0.5)
            }

            .login-button{
                background-color: #007bff;
                color: white;
                border: none;
                padding: 15px;
                border-radius: 8px;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                width: 100%;
                margin-top: 10px;
                transition: 0.3s;
            }

            .login-button:hover{
                background-color: #0056b3;
                transform: translateY(-2px);
            }

            .footer-text{
                margin-top: 25px;
                font-size: 14px;
            }

            .footer-text a{
                color: #007bff;
                text-decoration: none;
                font-weight: bold;
            }

            .footer-text a:hover{
                text-decoration: underline;
            }
        </style>
    </head>

    <body>
        <div class="login-container">
    <h2>Masuk</h2>
    
    <form>
        <div class="input-group">
            <label for="user_email">Email</label>
            <input type="text" id="user_email" placeholder="Masukkan email anda" required>
        </div>
        
        <div class="input-group">
            <label for="pass">Kata Sandi</label>
            <input type="password" id="pass" placeholder="Masukkan kata sandi" required>
        </div>
        
        <button type="submit" class="login-button">Masuk Sekarang</button>
    </form>
    
    <p class="footer-text">
        Belum punya akun? <a href="register.html">Daftar di sini.</a>
    </p>
</div>
    </body>
</html>
