<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halaman Daftar dengan Latar Belakang Transparan</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
        }

        body {
            background-image: url('CrownLands.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        body::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.6); 
            z-index: 1; 
            pointer-events: none;
        }

        .register-container {
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            width: 500px;
            position: relative;
            z-index: 10;
        }

        .register-container h2 {
            color: white;
            margin-bottom: 25px;
            font-weight: bold;
        }

        .input-group {
            margin-bottom: 15px;
            text-align: left;
        }

        .input-group label {
            color: white;
            margin-bottom: 8px;
            display: block;
        }

        .input-group input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border-radius: 8px;
            margin-bottom: 10px;

            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
        }

        .input-group input:focus {
            border-color: #007bff;
            background: rgba(255, 255, 255, 0.2);
        }

        .input-group input::placeholder {
            color: rgba(255, 255, 255, 0.7);
        }

        .register-button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: background-color 0.3s;
        }

        .register-button:hover {
            background-color: #0056b3;
        }

        .login-text {
            margin-top: 25px;
            font-size: 14px;
            color: #555;
        }

        .login-text a {
            color: #007bff;
            text-decoration: none;
            font-weight: bold;
        }

        .login-text a:hover {
            text-decoration: underline;
        }

        .phone-input-group {
            display: flex;           
            align-items: center;     
            background: rgba(255, 255, 255, 0.1); 
            border: 1px solid rgba(255, 255, 255, 0.3); 
            border-radius: 8px;
            padding-left: 15px;      
            overflow: hidden;        
            width: 100%;             
            box-sizing: border-box;  
        }

        .prefix {
            color: white;
            font-weight: bold;
            font-size: 16px;
            white-space: nowrap;    
            margin-right: 10px;      
        }

        .phone-input-group input {
            flex: 1;                
            background: transparent !important; 
            border: none !important;            
            color: white;
            font-size: 16px;
            padding: 15px 10px 15px 0; 
            outline: none !important;   
            box-shadow: none !important;
        }

        .phone-box:focus-within {
            border-color: #007bff;
            background: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 8px rgba(0, 123, 255, 0.2);
        }
    </style>
</head>
<body>

<div class="register-container">
    <h2 style="text-align: center;">Daftar</h2>
    
<form>
    <div class="input-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="E.g. email@gmail.com" required>
    </div>

    <div class="input-group">
        <label for="username">Name</label>
        <input type="text" id="username" name="username" placeholder="E.g. Paul Klein" required>
    </div>

    <div class="input-group">
        <label for="phone">Phone Number</label>
        <div class="phone-input-container">
            <input type="tel" id="phone" name="phone" required>
        </div>
    </div>
    
    <div class="input-group">
        <label for="password">Kata Sandi</label>
        <input type="password" id="password" name="password" placeholder="Masukkan kata sandi" required>
    </div>
    
    <button class="register-button" type="submit">Daftar</button>
</form>
    
    <p class="login-text">Sudah punya akun? <a href="login.html">Masuk.</a></p>
</div>

</body>
</html>
