<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirm Appointment</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* CSS Tambahan biar pesan errornya cantik */
        .error-msg {
            color: #ff4d4d;
            font-size: 11px;
            margin-top: 4px;
            display: block;
            min-height: 15px;
        }
        .input-error {
            border: 1px solid #ff4d4d !important;
        }
    </style>
</head>
<body>

    <div class="booking-card">
        <div class="header">
            <div class="logo-circle">C</div>
            <div class="powered-by">POWERED BY <br><span>CROWN BARBERSHOP</span></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </div>
            <div class="nav-separator">></div>
            <div class="nav-item active">Confirm</div>
            <div class="nav-separator">></div>
            <div class="nav-item disabled">Success</div>
        </div>

        <div class="summary-section">
            <p id="displayDate" class="summary-date">Tuesday, March 31, 2026</p>
            <h3 class="summary-service" id="displayService">Haircut (30-40min)</h3>
            <p class="summary-detail">with <span id="displayStylist">Barber</span> at <span id="displayTime">11:20 am</span></p>
        </div>

        <div class="form-container" style="padding: 20px;">
            <div class="input-group">
                <label>Enter your phone number</label>
                <input type="text" id="phone" placeholder="(000) 000-0000">
                <span id="error-phone" class="error-msg"></span>
            </div>

           <div class="reminder-section">
                <p>Would you like to receive appointment reminders?</p>
                
                <label class="radio-option">
                    <input type="radio" name="reminder" value="yes" checked>
                    <span class="custom-radio"></span>
                    Yes, send appointment reminders
                </label>

                <label class="radio-option">
                    <input type="radio" name="reminder" value="no">
                    <span class="custom-radio"></span>
                    No, do not send appointment reminders
                </label>
                
                <small class="disclaimer">You can opt out at any time. Data rates may apply. Message frequency varies. Reply STOP to cancel.</small>
            </div>

            <div class="row" style="display: flex; gap: 10px;">
                <div class="input-group" style="flex: 1;">
                    <label>First name</label>
                    <input type="text" id="firstName" placeholder="First name">
                    <span id="error-firstName" class="error-msg"></span>
                </div>
                <div class="input-group" style="flex: 1;">
                    <label>Last name</label>
                    <input type="text" id="lastName" placeholder="Last name">
                    <span id="error-lastName" class="error-msg"></span>
                </div>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Email address">
                <span id="error-email" class="error-msg"></span>
            </div>
        </div>

        <div class="footer-action" style="padding: 20px;">
            <button class="btn-book" style="width: 100%;" onclick="handleBooking()">Book Now</button>
        </div>
    </div>

    <script>
        // 1. Ambil data dari localStorage buat ringkasan di atas
        const cart = JSON.parse(localStorage.getItem('cart')) || [];
        const stylist = localStorage.getItem('selectedStylist') || "Barber";
        const date = localStorage.getItem('selectedFullDate') || "Tuesday, March 31, 2026";
        const time = localStorage.getItem('selectedTime') || "11:20 am";

        document.getElementById('displayDate').innerText = date;
        document.getElementById('displayTime').innerText = time;
        document.getElementById('displayStylist').innerText = stylist;
        
        if(cart.length > 0) {
            document.getElementById('displayService').innerText = cart[0].nama + " (" + cart[0].harga + ")";
        }

        // 2. Fungsi Validasi Form
        function handleBooking() {
            // List input dan error span-nya
            const inputs = [
                { input: document.getElementById('phone'), error: document.getElementById('error-phone'), msg: "Phone number is required" },
                { input: document.getElementById('firstName'), error: document.getElementById('error-firstName'), msg: "First name is required" },
                { input: document.getElementById('lastName'), error: document.getElementById('error-lastName'), msg: "Last name is required" },
                { input: document.getElementById('email'), error: document.getElementById('error-email'), msg: "Email is required" }
            ];

            let isValid = true;

            inputs.forEach(item => {
                if (item.input.value.trim() === "") {
                    item.error.innerText = item.msg;
                    item.input.classList.add('input-error');
                    isValid = false;
                } else {
                    item.error.innerText = "";
                    item.input.classList.remove('input-error');
                }
            });

            if (isValid) {
                window.location.href = 'success.html';
            }
        }
    </script>
</body>
</html>
