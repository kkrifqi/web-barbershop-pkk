<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Service</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="booking-card">
        <div class="header">
            <div class="logo-circle">C</div>
            <div class="powered-by">POWERED BY <br><span>CROWN BARBERSHOP</span></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </div>
            <div class="nav-separator">></div>
            <div class="nav-item active">Service</div>
            <div class="nav-separator">></div>
            <div class="nav-item disabled">Date</div>
        </div>

        <div class="content-summary">
    <h3>Your services</h3>
    <div id="list-layanan-otomatis">
        </div>

    <div class="add-more-section">
        <p>Do you want to add another service?</p>
        <div class="button-group">
            <button class="btn-outline" onclick="window.location.href='service.html'">Yes</button>
            <button class="btn-outline" onclick="window.location.href='date.html'">No</button>
        </div>
    </div>
</div>

    <script>
    const container = document.getElementById('list-layanan-otomatis');
    const dataLayanan = JSON.parse(localStorage.getItem('cart')) || [];

    dataLayanan.forEach((item, index) => {
        container.innerHTML += `
            <div class="selected-service-card">
                <div class="service-main">
                    <span class="service-title">${item.nama}</span>
                    <span class="remove-btn" onclick="hapusLayanan(${index})">Remove</span>
                </div>
                <div class="service-subtext">with ${item.stylist}</div>
            </div>
        `;
    });

    function hapusLayanan(index) {
        dataLayanan.splice(index, 1);
        localStorage.setItem('cart', JSON.stringify(dataLayanan));
        location.reload(); // Refresh halaman buat update list
    }
    </script>
</body>
</html>
