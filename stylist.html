<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Stylist</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="booking-card">
        <div class="header">
            <div class="logo">
                <div class="logo-circle">C</div>
            </div>
            <div class="powered-by">
                POWERED BY <br>
                <span>CROWN BARBERSHOP</span>
            </div>
        </div>

        <div class="nav-bar">
            <div class="nav-item back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </div>
            <div class="nav-separator">></div>
            <div class="nav-item active">Service</div>
            <div class="nav-separator">></div>
            <div class="nav-item disabled">Date</div>
        </div>

        <div class="stylist-list">
            <div class="stylist-item" onclick="pilihStylist('Anyone')">
                <div class="stylist-avatar-icon">
                    <i class="fa-solid fa-users"></i>
                </div>
                <div class="stylist-info">
                    <span class="stylist-name" style="color: #1a1a7a;">Anyone</span>
                    <span class="stylist-schedule">TUE-SAT</span>
                </div>
                <div class="stylist-price">$45 - $55</div>
            </div>

            <div class="stylist-item" onclick="pilihStylist('Matt Galbraith')">
                <div class="stylist-photo">
                    <img src="https://via.placeholder.com/50" alt="Matt">
                </div>
                <div class="stylist-info">
                    <span class="stylist-name">Matt Galbraith (he/him)</span>
                    <span class="stylist-schedule">TUE-SAT</span>
                </div>
                <div class="stylist-price">$50</div>
            </div>

            <div class="stylist-item" onclick="pilihStylist('Andrew Helinski')">
                <div class="stylist-photo">
                    <img src="https://via.placeholder.com/50" alt="Andrew">
                </div>
                <div class="stylist-info">
                    <span class="stylist-name">Andrew Helinski (he/him)</span>
                    <span class="stylist-schedule">TUE-SAT</span>
                </div>
                <div class="stylist-price">$55</div>
            </div>

            <div class="stylist-item" onclick="pilihStylist('Em Crawford')">
                <div class="stylist-photo">
                    <img src="https://via.placeholder.com/50" alt="Em">
                </div>
                <div class="stylist-info">
                    <span class="stylist-name">Em Crawford (they/them)</span>
                    <span class="stylist-schedule">TUE-SAT</span>
                </div>
                <div class="stylist-price">$45</div>
            </div>
        </div>
    </div>

    <script>
        function pilihStylist(namaStylist) {
            // 1. Ambil data keranjang dari memori browser
            let daftarLayanan = JSON.parse(localStorage.getItem('cart')) || [];
            
            if (daftarLayanan.length > 0) {
                // 2. Update layanan yang paling terakhir (index terakhir)
                // Ganti 'Pending...' jadi nama stylist beneran
                daftarLayanan[daftarLayanan.length - 1].stylist = namaStylist;
                
                // 3. Simpan lagi ke memori
                localStorage.setItem('cart', JSON.stringify(daftarLayanan));
            }
            
            // 4. Langsung pindah ke halaman summary
            window.location.href = 'summary.html';
        }
    </script>
</body>
</html>
