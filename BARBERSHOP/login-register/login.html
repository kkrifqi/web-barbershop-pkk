<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk — Crown Barbershop</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <div class="auth-container">
        <h2>Masuk</h2>

        <!-- Kotak pesan error / sukses -->
        <div class="auth-alert" id="auth-alert" style="display:none;"></div>

        <form id="form-login">
            <div class="input-group">
                <label for="user_email">Email</label>
                <input type="email" id="user_email" name="email"
                       placeholder="Masukkan email anda" required>
            </div>

            <div class="input-group">
                <label for="pass">Kata Sandi</label>
                <input type="password" id="pass" name="password"
                       placeholder="Masukkan kata sandi" required>
            </div>

            <button type="submit" class="auth-button" id="btn-login">
                Masuk Sekarang
            </button>
        </form>

        <p class="auth-footer">
            Belum punya akun? <a href="register.html">Daftar di sini.</a>
        </p>
    </div>

<script>
    const form    = document.getElementById('form-login');
    const btnLogin = document.getElementById('btn-login');
    const alertBox = document.getElementById('auth-alert');

    function tampilAlert(pesan, tipe = 'error') {
        alertBox.textContent  = pesan;
        alertBox.className    = `auth-alert auth-alert--${tipe}`;
        alertBox.style.display = 'block';
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('user_email').value.trim();
        const password = document.getElementById('pass').value.trim();

        // Nonaktifkan tombol biar tidak double submit
        btnLogin.disabled    = true;
        btnLogin.textContent = 'Memproses...';

        try {
            const res  = await fetch('../api/auth.php', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({ action: 'login', email, password })
            });

            const data = await res.json();

            if (data.success) {
                tampilAlert(data.message, 'success');
                // Tunggu sebentar biar user baca pesan, lalu redirect
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 800);
            } else {
                tampilAlert(data.message, 'error');
                btnLogin.disabled    = false;
                btnLogin.textContent = 'Masuk Sekarang';
            }

        } catch (err) {
            tampilAlert('Terjadi kesalahan. Coba lagi.', 'error');
            btnLogin.disabled    = false;
            btnLogin.textContent = 'Masuk Sekarang';
        }
    });
</script>

</body>
</html>
