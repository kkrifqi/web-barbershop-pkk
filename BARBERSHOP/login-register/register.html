<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar — Crown Barbershop</title>
    <link rel="stylesheet" href="../assets/css/global.css">
    <link rel="stylesheet" href="../assets/css/auth.css">
</head>
<body>

    <div class="auth-container">
        <h2>Daftar</h2>

        <!-- Kotak pesan error / sukses -->
        <div class="auth-alert" id="auth-alert" style="display:none;"></div>

        <form id="form-register">
            <div class="input-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email"
                       placeholder="E.g. email@gmail.com" required>
            </div>

            <div class="input-group">
                <label for="username">Nama</label>
                <input type="text" id="username" name="username"
                       placeholder="E.g. Paul Klein" required>
            </div>

            <div class="input-group">
                <label for="phone">Nomor Telepon</label>
                <div class="phone-input-group">
                    <span class="phone-prefix">+62</span>
                    <input type="tel" id="phone" name="phone"
                           placeholder="8xx xxxx xxxx">
                </div>
            </div>

            <div class="input-group">
                <label for="password">Kata Sandi</label>
                <input type="password" id="password" name="password"
                       placeholder="Minimal 6 karakter" required>
            </div>

            <button type="submit" class="auth-button" id="btn-register">
                Daftar Sekarang
            </button>
        </form>

        <p class="auth-footer">
            Sudah punya akun? <a href="login.html">Masuk.</a>
        </p>
    </div>

<script>
    const form       = document.getElementById('form-register');
    const btnReg     = document.getElementById('btn-register');
    const alertBox   = document.getElementById('auth-alert');

    function tampilAlert(pesan, tipe = 'error') {
        alertBox.textContent   = pesan;
        alertBox.className     = `auth-alert auth-alert--${tipe}`;
        alertBox.style.display = 'block';
    }

    form.addEventListener('submit', async function (e) {
        e.preventDefault();

        const email    = document.getElementById('email').value.trim();
        const nama     = document.getElementById('username').value.trim();
        const phone    = document.getElementById('phone').value.trim();
        const password = document.getElementById('password').value.trim();

        btnReg.disabled    = true;
        btnReg.textContent = 'Mendaftarkan...';

        try {
            const res  = await fetch('../api/auth.php', {
                method : 'POST',
                headers: { 'Content-Type': 'application/json' },
                body   : JSON.stringify({
                    action  : 'register',
                    nama,
                    email,
                    no_hp   : '+62' + phone,
                    password
                })
            });

            const data = await res.json();

            if (data.success) {
                tampilAlert(data.message, 'success');
                setTimeout(() => {
                    window.location.href = data.redirect;
                }, 1000);
            } else {
                tampilAlert(data.message, 'error');
                btnReg.disabled    = false;
                btnReg.textContent = 'Daftar Sekarang';
            }

        } catch (err) {
            tampilAlert('Terjadi kesalahan. Coba lagi.', 'error');
            btnReg.disabled    = false;
            btnReg.textContent = 'Daftar Sekarang';
        }
    });
</script>

</body>
</html>
