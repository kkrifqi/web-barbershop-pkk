<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Date</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="booking-card">
        <div class="header">
            <div class="logo-circle">C</div>
            <div class="powered-by">POWERED BY <br><span>CROWN BARBERSHOP</span></div>
        </div>

        <div class="nav-bar">
            <div class="nav-item back" onclick="history.back()">
                <i class="fa-solid fa-chevron-left"></i> Back
            </div>
            <div class="nav-separator">></div>
            <div class="nav-item active">Date</div>
            <div class="nav-separator">></div>
            <div class="nav-item disabled">Confirm</div>
        </div>

        <div class="calendar-header">
            <button class="nav-btn" onclick="movePrev()"><i class="fa-solid fa-chevron-left"></i></button>
            <h3 id="monthDisplay">March 2026</h3>
            <button class="nav-btn" onclick="moveNext()"><i class="fa-solid fa-chevron-right"></i></button>
        </div>

        <div class="date-scroller" id="dateScroller"></div>

        <div class="selection-banner">
            Selected Date: <strong id="selectedFullDate">Thursday, March 26, 2026</strong>
        </div>

        <div class="time-options">
            <div class="time-group">
                <div class="time-header" onclick="toggleTime('Morning')">
                    <span><strong>MORNING:</strong> 9:40 AM - 12:00 PM</span>
                    <i class="fa-solid fa-chevron-right" id="iconMorning"></i>
                </div>
                <div class="time-content" id="contentMorning" style="display: none;">
                    <button class="btn-time" onclick="keHalamanConfirm('9:40 am')">9:40 am</button>
                    <button class="btn-time" onclick="keHalamanConfirm('10:20 am')">10:20 am</button>
                    <button class="btn-time" onclick="keHalamanConfirm('11:20 am')">11:20 am</button>
                </div>
            </div>

            <div class="time-group">
                <div class="time-header" onclick="toggleTime('Afternoon')">
                    <span><strong>AFTERNOON:</strong> 12:20 PM - 1:00 PM</span>
                    <i class="fa-solid fa-chevron-right" id="iconAfternoon"></i>
                </div>
                <div class="time-content" id="contentAfternoon" style="display: none;">
                    <button class="btn-time" onclick="keHalamanConfirm('12:20 pm')">12:20 pm</button>
                    <button class="btn-time" onclick="keHalamanConfirm('1:00 pm')">1:00 pm</button>
                </div>
            </div>
        </div>

    <script>
    const slider = document.getElementById('dateScroller');
    const monthDisplay = document.getElementById('monthDisplay');
    const fullDateDisplay = document.getElementById('selectedFullDate');
    
    const months = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
    const days = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

    // 1. GENERATE TANGGAL
    function initCalendar() {
        let start = new Date();
        for (let i = 0; i < 90; i++) {
            let d = new Date();
            d.setDate(start.getDate() + i);
            
            const card = document.createElement('div');
            card.className = 'date-card' + (i === 0 ? ' active' : '');
            card.dataset.month = months[d.getMonth()];
            card.dataset.year = d.getFullYear();
            card.dataset.full = d.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });

            card.innerHTML = `<div class="day-name">${days[d.getDay()]}</div><div class="day-number">${d.getDate()}</div>`;
            card.onclick = () => {
                document.querySelectorAll('.date-card').forEach(el => el.classList.remove('active'));
                card.classList.add('active');
                fullDateDisplay.innerText = card.dataset.full;
            };
            slider.appendChild(card);
        }
    }

    // 2. NAVIGASI SLIDER
    function moveNext() { slider.scrollBy({ left: 200, behavior: 'smooth' }); }
    function movePrev() { slider.scrollBy({ left: -200, behavior: 'smooth' }); }

    // 3. AUTO UPDATE BULAN
    slider.addEventListener('scroll', () => {
        const cards = document.querySelectorAll('.date-card');
        const containerLeft = slider.getBoundingClientRect().left;
        for (let card of cards) {
            let rect = card.getBoundingClientRect();
            if (rect.left >= containerLeft && rect.left < containerLeft + 100) {
                monthDisplay.innerText = `${card.dataset.month} ${card.dataset.year}`;
                break;
            }
        }
    });

    // 4. FUNGSI BUKA TUTUP JAM (ACCORDION)
    function toggleTime(session) {
        const content = document.getElementById('content' + session);
        const icon = document.getElementById('icon' + session);
        
        if (content.style.display === "none") {
            content.style.display = "block";
            icon.className = "fa-solid fa-chevron-down";
        } else {
            content.style.display = "none";
            icon.className = "fa-solid fa-chevron-right";
        }
    }

    // 5. VALIDASI & PINDAH HALAMAN
    function keHalamanConfirm(jam) {
        // Cek dulu apakah tanggal sudah dipilih (ada class active)
        const tanggalAktif = document.querySelector('.date-card.active');

        if (!tanggalAktif) {
            alert("Silakan pilih tanggalnya dulu di atas ya Silvia!");
            return;
        }

        localStorage.setItem('selectedTime', jam);
        localStorage.setItem('selectedFullDate', tanggalAktif.dataset.full);
        window.location.href = 'confirm.html';
    }

    initCalendar();
    </script>
</body>
</html>
